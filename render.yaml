# Render Blueprint — deploy the TwinFit backend free tier.
# In Render: New + → Blueprint → point at this repo.
services:
  - type: web
    name: twinfit-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # ── Runtime ──
      - key: PYTHON_VERSION
        value: 3.11.9
      # ── Garment analysis (Gemini free tier) ──
      - key: GEMMA_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: GEMMA_MODEL
        value: models/gemini-3.5-flash
      - key: GEMMA_API_KEY
        sync: false          # paste in dashboard
      # ── Try-on engines ──
      - key: TRYON_HF_SPACE
        sync: false          # your Modal URL
      - key: TRYON_ENGINE_LABEL
        value: IDM-VTON @ Modal (serverless GPU)
      - key: GEMINI_IMAGE_MODEL
        value: models/gemini-3.1-flash-image
      - key: HF_TOKEN
        sync: false
      # ── Persistence & storage ──
      - key: DATABASE_URL
        sync: false          # Neon connection string
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_BASE_URL
        value: ""
      # ── Multi-tenancy ──
      - key: REQUIRE_API_KEY
        value: "false"       # flip true once merchants have keys
      - key: DEMO_API_KEY
        value: twinfit-demo
